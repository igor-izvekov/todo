<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Успешная авторизация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card success-card">
            <h1>Авторизация успешна!</h1>
            
            <div class="user-info">
                <img src="{{ .user.Picture }}" alt="Avatar" class="avatar">
                <div class="info-details">
                    <p><strong>ID:</strong> {{ .user.ID }}</p>
                    <p><strong>Имя:</strong> {{ .user.Name }}</p>
                    <p><strong>Email:</strong> {{ .user.Email }}</p>
                    <p><strong>Email подтвержден:</strong> {{ .user.VerifiedEmail }}</p>
                    <p><strong>Язык:</strong> {{ .user.Locale }}</p>
                </div>
            </div>
            
            <a href="/" class="home-btn">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
